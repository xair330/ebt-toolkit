name: Build AeroEBT

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AeroEBT_v3.3.exe
            asset_suffix: windows
          - os: macos-latest
            artifact_name: AeroEBT_v3.3
            asset_suffix: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --prefer-binary
          pip install --prefer-binary pyinstaller customtkinter pandas numpy openpyxl xlrd matplotlib seaborn pillow psutil

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: python -m PyInstaller AeroEBT.spec

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller AeroEBT.spec
          cd dist
          zip -r AeroEBT_v3.3_macos.zip AeroEBT_v3.3.app 2>/dev/null || zip -r AeroEBT_v3.3_macos.zip AeroEBT_v3.3

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AeroEBT-${{ matrix.asset_suffix }}
          path: dist/AeroEBT_v3.3.exe
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AeroEBT-${{ matrix.asset_suffix }}
          path: dist/AeroEBT_v3.3_macos.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AeroEBT-windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AeroEBT-macos
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
